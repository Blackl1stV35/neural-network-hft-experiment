# configs/model/cnn_lstm.yaml
name: cnn_lstm
type: cnn_lstm

cnn:
  in_channels: 1
  channels: [32, 64, 128]     # per-scale channel count for multi-scale CNN
  kernel_sizes: [3, 5, 7]     # multi-scale: 3-bar, 5-bar, 7-bar patterns
  dropout: 0.25

lstm:
  hidden_size: 192
  num_layers: 3
  dropout: 0.35
  bidirectional: false

attention:
  type: causal_temporal
  heads: 8
  dim: 192

fusion:
  method: concat_project   # stub so sweeps can override
  hidden_dim: 256
  sentiment_dim: 768
  ta_dim: 12

