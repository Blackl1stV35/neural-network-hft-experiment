model:
  name: cnn_lstm
  type: cnn_lstm

  cnn:
    in_channels: 1
    channels: [32, 64, 128]
    kernel_sizes: [3, 5, 7]
    dropout: 0.25

  lstm:
    hidden_size: 192
    num_layers: 3
    dropout: 0.35
    bidirectional: false

  attention:
    type: causal_temporal
    heads: 8
    dim: 192

  fusion:
    method: concat_project
    hidden_dim: 256
    sentiment_dim: 768
    ta_dim: 12

  classifier:
    hidden_dims: [128, 64]
    output_dim: 3
    dropout: 0.4

  input:
    sequence_length: 120
    feature_dim: 6
