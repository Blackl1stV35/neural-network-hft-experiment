name: cnn_lstm
type: cnn_lstm

cnn:
  in_channels: 1
  channels: [32, 64, 128]     # per-scale channel count for multi-scale CNN
  kernel_sizes: [3, 5, 7]     # multi-scale: 3-bar, 5-bar, 7-bar patterns
  dropout: 0.25

lstm:
  hidden_size: 192
  num_layers: 3
  dropout: 0.35
  bidirectional: false

attention:
  type: causal_temporal
  heads: 8
  dim: 192

classifier:
  hidden_dims: [128, 64]
  output_dim: 3  # buy, hold, sell
  dropout: 0.4

input:
  sequence_length: 120  # 120 M1 candles = 2 hours
  feature_dim: 6  # OHLCV + spread
