# W&B Sweep Configuration for XAUUSD Trading Models
# ===================================================
#
# Usage:
#   wandb sweep configs/sweep.yaml
#   wandb agent <sweep_id>
#
# This sweep addresses the critical issues found in the 8-Apr experiment:
#   1. Near-zero hold class (101/330k) → labeling parameters need widening
#   2. ~60% accuracy ≈ majority-class baseline → model not learning signal
#   3. Mamba NaN losses → numerical stability
#   4. Val loss diverging by epoch 10 → overfitting
#   5. Backtest PF <1 with >100% drawdown → no edge

command:
  - ${env}
  - python
  - ${program}
  - ${args_no_hyphens}

program: scripts/train.py
method: bayes
metric:
  name: val/loss
  goal: minimize

early_terminate:
  type: hyperband
  min_iter: 8
  eta: 2
  max_iter: 60

parameters:
  # ============================================================
  # LABELING
  # ============================================================
  data.labeling.profit_target_pips:
    distribution: categorical
    values: [60, 80, 100, 120]

  data.labeling.stop_loss_pips:
    distribution: categorical
    values: [30, 40, 50, 60]

  data.labeling.max_holding_minutes:
    distribution: categorical
    values: [300, 480, 720, 1380]

  data.labeling.pip_value:
    value: 0.10

  # ============================================================
  # MODEL ARCHITECTURE
  # ============================================================
  model.type:
    distribution: categorical
    values: [cnn_lstm, mamba_ssm]

  model.classifier.dropout:
    distribution: uniform
    min: 0.2
    max: 0.5

  model.input.sequence_length:
    distribution: categorical
    values: [60, 120, 240, 480]

  model.lstm.hidden_size:
    distribution: categorical
    values: [64, 128, 256]

  model.lstm.num_layers:
    distribution: categorical
    values: [1, 2, 3]

  model.lstm.dropout:
    distribution: uniform
    min: 0.1
    max: 0.5

  model.mamba.d_model:
    distribution: categorical
    values: [64, 128, 256]

  model.mamba.n_layers:
    distribution: categorical
    values: [2, 4, 6]

  model.mamba.d_state:
    distribution: categorical
    values: [8, 16, 32]

  model.mamba.dropout:
    distribution: uniform
    min: 0.05
    max: 0.3

  # Fusion block stub (needed for Hydra)
  model.fusion.hidden_dim:
    distribution: categorical
    values: [128, 256, 512]

  # ============================================================
  # TRAINING
  # ============================================================
  training.learning_rate:
    distribution: log_uniform_values
    min: 0.00003
    max: 0.001

  training.weight_decay:
    distribution: log_uniform_values
    min: 0.000001
    max: 0.001

  training.batch_size:
    distribution: categorical
    values: [128, 256, 512]

  training.gradient_clip:
    distribution: categorical
    values: [0.5, 1.0, 2.0]

  training.epochs:
    value: 60

  training.early_stopping_patience:
    distribution: categorical
    values: [10, 15, 20]

  training.mixed_precision:
    value: false

  # ============================================================
  # DATA
  # ============================================================
  data.preprocessing.window_size:
    distribution: categorical
    values: [60, 120, 240]

  data.preprocessing.scaling:
    distribution: categorical
    values: [window_minmax, zscore]

  data.sentiment.enabled:
    distribution: categorical
    values: [true, false]

  # ============================================================
  # FIXED PARAMETERS
  # ============================================================
  data.name:
    value: xauusd
  data.symbol:
    value: XAUUSD
  data.timeframe:
    value: M1
  project.seed:
    value: 42
  project.device:
    value: auto
  training.num_workers:
    value: 4
  training.val_split:
    value: 0.15
  training.test_split:
    value: 0.10
