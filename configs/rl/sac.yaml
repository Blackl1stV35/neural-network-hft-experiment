name: sac
type: sac

agent:
  gamma: 0.99
  tau: 0.005
  alpha: 0.2
  auto_alpha: true
  actor_lr: 3e-4
  critic_lr: 3e-4
  alpha_lr: 3e-4
  hidden_dims: [256, 256]
  batch_size: 256

replay_buffer:
  capacity: 1_000_000
  min_size: 10_000

training:
  total_steps: 500_000
  eval_every: 5_000
  update_every: 1
  updates_per_step: 1

reward:
  profit_weight: 1.0
  risk_penalty: 0.5
  slippage_model: true
  commission_per_lot: 7.0  # USD per round trip
  spread_pips: 2.0
