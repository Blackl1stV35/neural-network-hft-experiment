name: xauusd
symbol: XAUUSD
timeframe: M1

source:
  type: mt5  # mt5 | csv | duckdb
  csv_path: null
  duckdb_path: data/ticks.duckdb

preprocessing:
  scaling: window_minmax  # window_minmax | zscore | robust
  window_size: 120
  fill_gaps: forward_fill
  remove_weekends: true
  session_filter: null  # null = all sessions, or "london" | "newyork" | "asian"

features:
  price: [open, high, low, close]
  volume: true
  spread: true
  ta_indicators:
    - rsi_14
    - bb_20_2
    - atr_14
    - ema_9
    - ema_21
    - macd_12_26_9
    - adx_14
    - stoch_14_3
    - vwap
    - obv

sentiment:
  enabled: true
  model: ProsusAI/finbert
  training_source:
    type: ft_sitemap
    start_month: "2024-01"
    end_month: null  # null = current month
    min_relevance: 0.01
    cache_dir: data/ft_cache
    request_delay: [1.0, 3.0]
    max_articles_per_month: 500
  live_source:
    type: gdelt  # free, no API key required
    update_interval: 900  # seconds (15 min)
    hours_back: 24
    max_articles: 20
  cache_dir: data/sentiment_cache
  embedding_dim: 768
  use_hidden_states: true  # use intermediate layers, not just labels
  lookback_hours: 24  # how far back to look for news per bar

labeling:
  method: triple_barrier
  profit_target_pips: 10
  stop_loss_pips: 5
  max_holding_minutes: 60
  classes: [sell, hold, buy]  # mapped to [0, 1, 2]
