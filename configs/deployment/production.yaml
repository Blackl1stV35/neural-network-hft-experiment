name: production

mode: paper  # paper | live

inference:
  engine: onnx  # onnx | pytorch
  device: cpu
  model_path: exports/best_model.onnx
  max_latency_ms: 5.0

broker:
  type: mt5
  symbol: XAUUSD
  lot_size: 0.01  # micro lot
  max_lots: 0.10
  magic_number: 20240101

risk:
  max_daily_drawdown_pct: 2.0
  max_position_risk_pct: 2.0
  max_consecutive_losses: 5
  loss_reduction_factor: 0.5
  recovery_trades: 10
  latency_kill_ms: 50.0
  news_blackout_minutes: 30
  blackout_events: [FOMC, NFP, CPI, PPI, GDP]
  human_exit_approval: true  # HITL: require human approval for position exits

monitoring:
  prometheus_port: 9090
  telegram_enabled: true
  alert_on:
    - daily_drawdown_breach
    - consecutive_loss_breach
    - latency_spike
    - model_error
    - connection_loss
  heartbeat_interval: 300  # seconds

schedule:
  trading_days: [monday, tuesday, wednesday, thursday, friday]
  start_utc: "00:05"
  end_utc: "23:55"
  maintenance_window: "00:00-00:05"
